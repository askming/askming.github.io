{% include header.html %}
  <link rel="stylesheet" type="text/css" href="http://fonts.googleapis.com/css?family=Inconsolata">
    <style>
      body {
        font-family: 'Inconsolata', 'consolas',sans-serif;
        font-size: 14px;
        letter-spacing: 1px;
        line-height: 20px;
      }
    </style>

<div class="row-fluid">
  <div class="span8">
    <h2>{{ page.title }}</h2>
    <p class="author">{{ page.post_author }}</p>
    <p class="muted">{{ page.date | date_to_long_string }}</p>
    <p class="tags">{{ page.tags }}</p>
    {{ content }}
  </div>
  <div class="span4">
    {% include sidebar.html %}
  </div>
</div>

<div class="row-fluid">
  <div class="span8">
  <p> <a href="/blog">Back to list</a> </p>
  </div>
</div>
