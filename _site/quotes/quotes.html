<blockquote>
  <p>长亭外古道边，</p>

  <p>芳草碧连天。</p>

  <p>晚风拂柳笛声残,</p>

  <p>夕阳山外山。</p>

  <p>天之涯，</p>

  <p>地之角，</p>

  <p>知交半零落。</p>

  <p>一瓢浊酒尽余欢，</p>

  <p>今宵别梦寒。</p>

  <div align="right"><i>-- 李叔同 ⎡送别⎦</i></div>
