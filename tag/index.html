<section class="blog tags">
  <div class="wrap">
    <h2> Tags </h2>
    {% for tag in site.tags %}
      {% for t in tag[0] %}
        <a><code class="highligher-rouge"><nobr>{{ t }}</nobr></code>&nbsp;</a>
        <!-- <h3> {{ t }} </h3> -->
        {% for post in site.tags[t] %}
          <li><a href="{{ post.url }}">{{ post.title }}</a> ({{ post.date | date_to_string }})<br>
            {{ post.description }}
          </li>
        {% endfor %}
      {% endfor %}
    {% endfor %}
  </div>
</section>
